<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#06070A">
<title>BT Performance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: #06070A; font-family: 'Manrope', sans-serif; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  @keyframes scfade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .screenfade { animation: scfade .3s ease both; }
  .tap { cursor: pointer; transition: transform .12s ease, opacity .12s ease; -webkit-tap-highlight-color: transparent; user-select: none; }
  .tap:active { transform: scale(.97); opacity: .85; }

  .stage { min-height: 100vh; min-height: 100dvh; background: radial-gradient(1100px 700px at 50% -8%, rgba(255,106,61,.10), transparent 60%), #06070A; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
  .phone { width: 382px; background: #000; border-radius: 48px; padding: 11px; box-shadow: 0 50px 110px -28px rgba(0,0,0,.9), 0 0 0 1px rgba(255,255,255,.05); }
  .device { position: relative; width: 360px; height: 780px; background: #0B0E12; border-radius: 38px; overflow: hidden; color: #F4F6F8; }

  .statusbar { position: absolute; top: 0; left: 0; right: 0; height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; z-index: 20; color: #F4F6F8; pointer-events: none; }
  .statusbar .island { position: absolute; left: 50%; top: 11px; transform: translateX(-50%); width: 96px; height: 26px; background: #000; border-radius: 14px; }

  .pagepad { position: relative; min-height: 100%; padding: 60px 22px 110px; }
  .card { background: #0D1015; border: 1px solid rgba(255,255,255,.06); border-radius: 14px; }
  .seclabel { font-size: 11px; font-weight: 700; letter-spacing: .12em; color: #5A6472; }
  .backbtn { width: 38px; height: 38px; border-radius: 11px; background: #14181F; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .btn-primary { font-family: 'Manrope'; font-weight: 700; font-size: 16px; color: #0B0E12; background: #FF6A3D; border: none; border-radius: 14px; padding: 16px; width: 100%; cursor: pointer; }
  .btn-dark { font-family: 'Manrope'; font-weight: 700; font-size: 15px; color: #F4F6F8; background: #1C232C; border: none; border-radius: 14px; padding: 16px; width: 100%; cursor: pointer; }

  .tabbar { position: absolute; bottom: 0; left: 0; right: 0; height: 84px; background: rgba(11,14,18,.92); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,.06); display: flex; justify-content: space-around; padding-top: 13px; z-index: 10; }
  .tabitem { display: flex; flex-direction: column; align-items: center; gap: 5px; }

  .f-label { display: block; font-size: 12px; font-weight: 700; color: #8A94A3; margin-top: 12px; }
  .f-input { width: 100%; background: #14181F; border: 1px solid rgba(255,255,255,.07); border-radius: 11px; padding: 12px 14px; color: #F4F6F8; font-family: 'Manrope'; font-size: 14px; outline: none; margin-top: 6px; }
  .f-input:focus { border-color: rgba(255,106,61,.5); }
  textarea.f-input { resize: none; }

  #modal-host { display: none; position: absolute; inset: 0; z-index: 40; }
  .modal-backdrop { position: absolute; inset: 0; background: rgba(4,5,8,.7); backdrop-filter: blur(3px); }
  .modal-card { position: absolute; left: 14px; right: 14px; bottom: 14px; max-height: 82%; overflow-y: auto; background: #11151B; border: 1px solid rgba(255,255,255,.08); border-radius: 22px; padding: 20px; animation: scfade .25s ease both; }

  #toast-host { display: none; position: absolute; top: 58px; left: 0; right: 0; z-index: 50; justify-content: center; pointer-events: none; }
  .toast { display: flex; align-items: center; gap: 9px; background: #14181F; border: 1px solid rgba(255,255,255,.1); border-radius: 12px; padding: 11px 16px; font-size: 13.5px; color: #F4F6F8; box-shadow: 0 14px 36px -8px rgba(0,0,0,.7); animation: scfade .25s ease both; max-width: 86%; }

  @media (max-width: 519px), (max-height: 879px) and (max-width: 880px) {
    .stage { padding: 0; display: block; }
    .phone { width: 100%; background: none; border-radius: 0; padding: 0; box-shadow: none; }
    .device { width: 100%; height: 100vh; height: 100dvh; border-radius: 0; }
    .statusbar { display: none; }
    .pagepad { padding-top: 24px; }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="phone">
      <div class="device">
        <div class="statusbar"><span style="font-family:'Space Grotesk';font-weight:600;font-size:14px;">9:41</span><div class="island"></div><div style="display:flex;align-items:center;gap:6px;"><svg width="17" height="12" viewBox="0 0 17 12" fill="#F4F6F8"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4.5" y="4.5" width="3" height="7.5" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg><svg width="22" height="12" viewBox="0 0 24 12" fill="none"><rect x="1" y="1" width="19" height="10" rx="3" stroke="#F4F6F8" opacity=".5"/><rect x="3" y="3" width="14" height="6" rx="1.5" fill="#F4F6F8"/><rect x="21" y="4" width="2" height="4" rx="1" fill="#F4F6F8" opacity=".5"/></svg></div></div>
        <div id="screen-root" style="position:absolute;inset:0;"></div>
        <div id="toast-host"></div>
        <div id="modal-host"></div>
      </div>
    </div>
  </div>
<script type="module" src="./js/app.js"></script>
</body>
</html>
